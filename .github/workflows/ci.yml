name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @designjs/bridge
        run: pnpm --filter @designjs/bridge build

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Build all packages
        run: pnpm -r --filter '!@designjs/bridge' build

      - name: Bridge round-trip smoke test
        run: |
          set -m
          pnpm --filter @designjs/app dev &
          APP_PGID=$!
          # wait up to 20s for the bridge to come up
          for i in $(seq 1 20); do
            if (echo > /dev/tcp/127.0.0.1/29170) 2>/dev/null; then break; fi
            sleep 1
          done
          node scripts/smoke-bridge.mjs
          SMOKE_RC=$?
          kill -- -$APP_PGID 2>/dev/null || true
          wait 2>/dev/null || true
          exit $SMOKE_RC

      - name: MCP stdio smoke test
        run: node scripts/smoke-mcp.mjs

      - name: designjs init smoke test
        run: |
          pnpm --filter @designjs/cli build
          node scripts/smoke-init.mjs

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @designjs/bridge
        run: pnpm --filter @designjs/bridge build

      - name: Build all packages
        run: pnpm -r --filter '!@designjs/bridge' build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
